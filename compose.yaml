services:
  auth-api:
    build: .
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    ports:
      - ${PORT}:80
    environment:
      - PORT=80
      - SQLITE_DB_PATH=/db/database.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - TOKEN_ISSUER=${TOKEN_ISSUER}
    volumes:
      - database-data:/db
    networks:
      - shared
      - default

volumes:
  database-data:

networks:
  shared:
    external: true
    name: auth-internal-network
